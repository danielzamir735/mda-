<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- Blocking dark-mode script: prevents FOUC by applying dark class before React loads -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('emt-settings');
          var theme = s ? JSON.parse(s).state.theme : 'dark';
          if (theme !== 'light') document.documentElement.classList.add('dark');
        } catch (_) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>חובש+</title>

    <!-- PWA manifest injected by VitePWA at build time -->
    <meta name="theme-color" content="#09090B" />

    <!-- iOS / Android standalone -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="חובש+" />
  </head>
  <body style="background-color:#09090B;margin:0;padding:0;">
    <div id="root">
      <div style="min-height:100dvh;background-color:#09090B;display:flex;align-items:center;justify-content:center;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
          <img src="/pwa-192x192.png" alt="" width="72" height="72" style="border-radius:20px;opacity:0.9;" />
          <div style="width:32px;height:32px;border:3px solid rgba(255,255,255,0.15);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        </div>
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
